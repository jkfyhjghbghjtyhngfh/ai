<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ChatGPT-5 — Local Demo</title>

  <!-- Import map for potential libs (kept minimal) -->
  <script type="importmap">
  {
    "imports": {
      "nanoid": "https://cdn.jsdelivr.net/npm/nanoid/nanoid.js"
    }
  }
  </script>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div class="brand">
        <div class="logo">5</div>
        <div>
          <h1>ChatGPT‑5 (Demo)</h1>
          <p class="muted">Local interactive AI front-end — simulated responses</p>
        </div>
      </div>
      <div class="controls">
        <label class="small">Persona
          <select id="persona">
            <option value="default">Balanced</option>
            <option value="concise">Concise</option>
            <option value="creative">Creative</option>
            <option value="expert">Expert</option>
          </select>
        </label>
        <button id="clear" title="Clear chat">Clear</button>
      </div>
    </header>

    <section id="chat" class="chat" aria-live="polite">
      <!-- messages injected here -->
      <div class="welcome">
        <strong>Welcome to ChatGPT‑5 (demo)</strong>
        <p>Type a message and press Enter. This demo simulates an advanced assistant locally — no server calls.</p>
      </div>
    </section>

    <form id="composer" class="composer" autocomplete="off">
      <textarea id="input" rows="1" placeholder="Ask anything... (Shift+Enter for newline)"></textarea>
      <div class="composer-right">
        <button type="button" id="tts" title="Speak response">🔊</button>
        <button type="submit" id="send">Send</button>
      </div>
    </form>

    <footer class="app-footer">
      <small class="muted">This is a frontend-only simulation. For real AI, connect an API key or backend.</small>
    </footer>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
