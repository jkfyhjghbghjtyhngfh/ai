<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <title>AI Chat</title>
</head>
<body>
  <main id="app">
    <section class="panel">
      <div id="messages" class="messages" aria-live="polite"></div>
      <form id="inputForm" class="input-row">
        <textarea id="input" rows="1" placeholder="Say something..." aria-label="Message"></textarea>
        <button id="send" type="submit" aria-label="Send">Send</button>
      </form>
    </section>
    <aside class="info">
      <h3>AI Chat</h3>
      <p>Converse with an AI. This demo uses the host's websim.chat API. Keep messages short.</p>
      <div class="conversations">
        <div class="conv-header">
          <button id="newConv" type="button">New</button>
          <button id="saveConv" type="button">Save</button>
        </div>
        <div id="convoList" class="convo-list" aria-live="polite"></div>
      </div>
      <button id="clear">Clear</button>
    </aside>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
